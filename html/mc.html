<div class="div-mc-main">
    <div class="div-mc-form">
        <h1 class="titre-mc">Me contacter</h1>
        <p class="p-mc">Laissez-moi un message !</p>
        
        <form id="contact-form" class="formulaire-mc">
            <input type="text" name="fi-sender-firstName" placeholder="Nom / Prénom" required class="input-mc">
            <input type="email" name="fi-sender-email" placeholder="Adresse Email" required class="input-mc">
            <textarea name="fi-text-message" placeholder="Votre message..." required class="input-mc textarea-mc"></textarea>
            
            <button type="submit" class="btn-mc">Envoyer</button>
            <div id="result-mc" style="margin-top: 10px; font-weight: bold; color: #FF0000;"></div>
        </form>
    </div>

    <div class="div-mc-visuel">
        <img class="img-mc" src="./public/visuel-contact.png" alt="Contact">
        <div class="liens-mc">
            <a href="https://github.com/gwebjs" target="_blank" class="btn-reseau">GitHub</a>
            <a href="https://discordapp.com/users/761486907430404098" target="_blank" class="btn-reseau">Discord</a>
        </div>
    </div>
</div>
