<div class="div-mc-grid">
    <div class="div-mc-gauche">
        <h1 class="titre-mc">Me contacter</h1>
        <p class="desc-mc">Vous avez un projet ou une question ?<br>Laissez-moi un message !</p>
        
        <img class="img-mc-contact" src="./public/coding.png" alt="Illustration Contact">
    </div>

    <div class="div-mc-droite">
        <form id="contactForm" class="form-mc">
            <div class="input-group-mc">
                <label for="nom">Nom / Prénom</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
            </div>
            <div class="input-group-mc">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" name="email" placeholder="votre@email.com" required>
            </div>
            <div class="input-group-mc">
                <label for="message">Votre Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Écrivez votre message ici..." required></textarea>
            </div>
            <button type="submit" class="btn-mc">Envoyer</button>
        </form>

        <div class="reseaux-mc">
            <h2 class="sous-titre-mc">Mes réseaux</h2>
            <div class="liens-reseaux">
                <a href="#" class="lien-mc">GitHub</a>
                <a href="#" class="lien-mc">LinkedIn</a>
                <a href="#" class="lien-mc">Email</a>
            </div>
        </div>
    </div>
</div>
