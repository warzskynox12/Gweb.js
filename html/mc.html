<div class="container-mc">
    <h1 class="titre-mc">Me contacter</h1>
    <p class="desc-mc">Vous avez un projet, une question, ou vous souhaitez simplement échanger ? Laissez-moi un message !</p>

    <form id="contactForm" class="form-mc">
        <div class="input-group-mc">
            <label for="nom">Nom / Prénom</label>
            <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
        </div>

        <div class="input-group-mc">
            <label for="email">Adresse Email</label>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required>
        </div>

        <div class="input-group-mc">
            <label for="message">Votre Message</label>
            <textarea id="message" name="message" rows="6" placeholder="Écrivez votre message ici..." required></textarea>
        </div>

        <button type="submit" class="btn-mc">Envoyer le message</button>
    </form>

    <div class="reseaux-mc">
        <h2 class="sous-titre-mc">Mes réseaux</h2>
        <div class="liens-reseaux">
            <a href="#" target="_blank" class="lien-mc">GitHub</a>
            <a href="#" target="_blank" class="lien-mc">LinkedIn</a>
            <a href="mailto:tonadresse@email.com" class="lien-mc">Email direct</a>
        </div>
    </div>
</div>
